<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#3f5f3f">
<title>Boating Booking — Udaipur Wildlife Sanctuary</title>
<link rel="stylesheet" href="../../css/header.css">
<link rel="stylesheet" href="../../css/common-ui.css">
</head>
<body>

<div id="headerContainer"></div>

<div class="page-header">
  <div>
    <h1>BOATING TICKET BOOKING</h1>
    <p>Udaipur Wildlife Sanctuary</p>
  </div>
  <button class="home-btn" onclick="goHome()">&#11013; HOME</button>
</div>

<div class="container">

  <div class="card">
    <h3>Visit Date</h3>
    <p class="note-text">NOTE: Monday Closed &nbsp;|&nbsp; Timing: 9 AM – 5 PM</p>
    <input type="text" id="date" class="date-input" readonly>
  </div>

  <div class="card">
    <h3>Boating</h3>
    <div class="item-row">
      <span class="item-label">Motor Boat &#8377;100</span>
      <div class="qty-box">
        <button onclick="changeQty('motor', -1)">&#8722;</button>
        <input type="number" id="motor" value="0" min="0">
        <button onclick="changeQty('motor', 1)">+</button>
      </div>
    </div>
    <div class="item-row">
      <span class="item-label">Shikara Boat &#8377;100</span>
      <div class="qty-box">
        <button onclick="changeQty('shikara', -1)">&#8722;</button>
        <input type="number" id="shikara" value="0" min="0">
        <button onclick="changeQty('shikara', 1)">+</button>
      </div>
    </div>
    <div class="item-row">
      <span class="item-label">Paddle Boat &#8377;50</span>
      <div class="qty-box">
        <button onclick="changeQty('paddle', -1)">&#8722;</button>
        <input type="number" id="paddle" value="0" min="0">
        <button onclick="changeQty('paddle', 1)">+</button>
      </div>
    </div>
  </div>

  <div class="total-bar" id="totalBar">TOTAL: &#8377;0</div>

  <div class="card">
    <h3>Visitor Details</h3>
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="Enter name (head of family)">
      <small>Enter only head of family name</small>
    </div>
    <div class="form-group">
      <label>Mobile Number</label>
      <input type="tel" id="mobile" placeholder="10-digit mobile number" maxlength="10">
    </div>
    <div class="form-group">
      <label>Gmail ID</label>
      <input type="email" id="gmail" placeholder="Enter Gmail ID">
      <small>Ticket will be sent here</small>
    </div>
  </div>

</div>

<div class="sticky-footer">
  <button class="btn-home" onclick="goHome()">HOME</button>
  <button class="btn-next" onclick="nextStep()">PREVIEW &#9654;</button>
</div>

<script src="/js/uws-state.js"></script>
<script src="/js/header-loader.js"></script>
<script src="../../js/boating/booking.js"></script>
</body>
</html>
