<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UPI Payment</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>

/* ===== BODY ===== */
body{
  margin:0;
  background:#6c3bd1;
  font-family:'Plus Jakarta Sans',sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* ===== PHONE ===== */
.phone{
  width:320px;
  height:600px;
  background:#fff;
  border-radius:30px;
  overflow:hidden;
  box-shadow:0 20px 40px rgba(0,0,0,0.3);
  display:flex;
  flex-direction:column;
}

/* ===== HEADER ===== */
.top{
  background:#6c3bd1;
  color:#fff;
  padding:20px;
  text-align:center;
  font-weight:700;
}

/* ===== CONTENT ===== */
.content{
  flex:1;
  padding:20px;
  text-align:center;
}

.amount{
  font-size:28px;
  font-weight:900;
  margin:20px 0;
}

.upi-id{
  font-size:14px;
  color:#555;
}

/* ===== BUTTON ===== */
.pay-btn{
  margin:20px;
  padding:14px;
  border:none;
  border-radius:25px;
  background:#6c3bd1;
  color:#fff;
  font-weight:900;
}

/* ===== LOADING ===== */
.loader{
  display:none;
  font-size:14px;
  margin-top:20px;
}

</style>
</head>

<body>

<div class="phone">

  <div class="top">UPI Payment</div>

  <div class="content">

    <div class="amount" id="amount">₹0</div>
    <div class="upi-id">pay@upi</div>

    <button class="pay-btn" onclick="startPayment()">Pay Now</button>

    <div class="loader" id="loader">Processing Payment...</div>

  </div>

</div>

<script>

/* LOAD DATA */
let data = JSON.parse(localStorage.getItem("allinoneData"));

let total =
(data.adult*10)+(data.child*5)+(data.motor*100)+(data.shikara*100)+(data.paddle*50)+(data.ev*20);

document.getElementById("amount").innerText = "₹" + total;

/* PAYMENT FLOW */
function startPayment(){

  document.querySelector(".pay-btn").style.display = "none";
  document.getElementById("loader").style.display = "block";

  setTimeout(() => {

    window.location.href = "processing.html";

  }, 2000);
}

</script>

</body>
</html>
