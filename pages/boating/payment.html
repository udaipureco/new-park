<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#3f5f3f">
<title>Payment — Udaipur Wildlife Sanctuary</title>
<link rel="stylesheet" href="../../css/header.css">
<link rel="stylesheet" href="../../css/common-ui.css">
</head>
<body class="payment-body">

<div id="headerContainer"></div>

<div class="payment-header">
  <h1>&#127807; Udaipur Wildlife Sanctuary</h1>
  <p>Secure UPI Payment</p>
</div>

<div class="payment-card">
  <div class="amount-box">
    <p>Total Amount</p>
    <h2 id="amount">&#8377;0</h2>
  </div>

  <div class="upi-box">
    <p>Pay to</p>
    <strong>udaipur@upi</strong>
  </div>

  <div class="qr-box">
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=udaipur@upi" alt="UPI QR Code">
    <p>Scan &amp; Pay</p>
  </div>

  <button class="pay-btn" id="payBtn" onclick="payNow()">PAY NOW</button>
  <div class="loading" id="loading">Processing Payment...</div>

  <button class="back-link" onclick="goBack()">&#9664; Back to Preview</button>
</div>

<script src="/js/header-loader.js"></script>
<script src="../../js/boating/payment.js"></script>
</body>
</html>
